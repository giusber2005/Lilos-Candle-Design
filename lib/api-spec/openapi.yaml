openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LilosCandle API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: cart
    description: Cart operations
  - name: orders
    description: Order operations
  - name: newsletter
    description: Newsletter operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get cart contents
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/item/{cartItemId}:
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: cartItemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: cartItemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get orders by email
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /newsletter:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      summary: Subscribe to newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterSubscribeRequest"
      responses:
        "200":
          description: Subscription successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        color:
          type: string
        colorHex:
          type: string
        aroma:
          type: string
        stock:
          type: integer
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - productId
        - color
        - colorHex
        - aroma
        - stock

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        price:
          type: number
        imageUrl:
          type: string
          nullable: true
        images:
          type: array
          items:
            type: string
        size:
          type: string
        material:
          type: string
        burnTime:
          type: string
        weight:
          type: string
        dimensions:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        featured:
          type: boolean
      required:
        - id
        - name
        - slug
        - description
        - shortDescription
        - price
        - images
        - size
        - material
        - burnTime
        - weight
        - dimensions
        - variants
        - featured

    CartItem:
      type: object
      properties:
        id:
          type: integer
        cartId:
          type: integer
        productId:
          type: integer
        variantId:
          type: integer
        quantity:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        variant:
          $ref: "#/components/schemas/ProductVariant"
      required:
        - id
        - cartId
        - productId
        - variantId
        - quantity
        - product
        - variant

    Cart:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        itemCount:
          type: integer
      required:
        - id
        - sessionId
        - items
        - total
        - itemCount

    AddToCartRequest:
      type: object
      properties:
        sessionId:
          type: string
        productId:
          type: integer
        variantId:
          type: integer
        quantity:
          type: integer
      required:
        - sessionId
        - productId
        - variantId
        - quantity

    UpdateCartItemRequest:
      type: object
      properties:
        quantity:
          type: integer
      required:
        - quantity

    ShippingAddress:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
      required:
        - firstName
        - lastName
        - email
        - address
        - city
        - postalCode
        - country

    CreateOrderRequest:
      type: object
      properties:
        sessionId:
          type: string
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
        shippingMethod:
          type: string
        paymentMethod:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - sessionId
        - shippingAddress
        - shippingMethod
        - paymentMethod

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        variantId:
          type: integer
        quantity:
          type: integer
        unitPrice:
          type: number
        productName:
          type: string
        variantColor:
          type: string
        variantAroma:
          type: string
      required:
        - id
        - orderId
        - productId
        - variantId
        - quantity
        - unitPrice
        - productName
        - variantColor
        - variantAroma

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum: [pending, confirmed, processing, shipped, delivered, cancelled]
        totalAmount:
          type: number
        shippingAmount:
          type: number
        shippingMethod:
          type: string
        paymentMethod:
          type: string
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        trackingNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - status
        - totalAmount
        - shippingAmount
        - shippingMethod
        - paymentMethod
        - shippingAddress
        - items
        - createdAt
        - updatedAt

    NewsletterSubscribeRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
      required:
        - email
